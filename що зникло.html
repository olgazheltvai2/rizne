<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Супер-гра на уважність</title>
    <style>
        /* Основні стилі та сюжетний фон у стилі поп-арт (комікс). Жодних білих прямокутників! */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-color: #00bcd4; /* Яскравий блакитний */
            background-image: 
                radial-gradient(#ffeb3b 15%, transparent 16%), 
                radial-gradient(#ffeb3b 15%, transparent 16%);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            font-family: 'Propysy Bold', 'Impact', sans-serif; /* Використання улюбленого жирного шрифту */
            font-weight: bold;
            user-select: none;
        }

        /* Контейнер для ігрового поля */
        #game-area {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Стилізація лічильника на 2 гравця */
        #scoreboard {
            display: flex;
            justify-content: space-around;
            padding: 15px;
            background: repeating-linear-gradient(45deg, #ff5722, #ff5722 20px, #ff9800 20px, #ff9800 40px);
            border-bottom: 8px solid #000;
            box-shadow: 0 10px 0 rgba(0,0,0,0.3);
            z-index: 10;
        }

        .player-panel {
            background-color: #8bc34a;
            border: 6px solid #000;
            border-radius: 15px;
            padding: 10px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 8px 8px 0 #000;
            transform: skewX(-5deg);
        }

        .player-panel:nth-child(2) {
            background-color: #e91e63;
        }

        .player-name {
            background: transparent;
            border: none;
            border-bottom: 4px dashed #000;
            text-align: center;
            font-size: 28px;
            font-family: 'Propysy Bold', 'Impact', sans-serif;
            font-weight: bold;
            color: #fff;
            text-shadow: 3px 3px 0 #000;
            width: 200px;
            margin-bottom: 10px;
            outline: none;
        }

        .score-display {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .score-btn {
            background-color: #ffeb3b;
            border: 4px solid #000;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 30px;
            cursor: pointer;
            box-shadow: 4px 4px 0 #000;
            transition: all 0.1s;
            font-family: 'Propysy Bold', 'Impact', sans-serif;
        }

        .score-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0 #000;
        }

        .score-value {
            font-size: 45px;
            color: #fff;
            text-shadow: 4px 4px 0 #000;
            min-width: 60px;
            text-align: center;
        }

        /* 3D Контейнер для картки */
        .card-container {
            perspective: 1500px;
            width: 600px;
            height: 400px;
            cursor: pointer;
            z-index: 5;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Пружинна анімація коміксу */
            transform-style: preserve-3d;
        }

        .card.flipped {
            transform: rotateY(180deg) scale(1.05);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border: 10px solid #000;
            border-radius: 25px;
            box-shadow: 15px 15px 0 rgba(0,0,0,0.7);
            display: flex;
            flex-wrap: wrap;
            justify-content: space-evenly;
            align-content: space-evenly;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Передня сторона картки - Змінено на темний коміксний фон для максимального контрасту емодзі */
        .card-front {
            background-color: #263238; 
            background-image: radial-gradient(#37474f 15%, transparent 16%), radial-gradient(#37474f 15%, transparent 16%);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
        }

        /* Задня сторона картки - Змінено на темний коміксний фон для максимального контрасту емодзі */
        .card-back {
            background-color: #263238; 
            background-image: radial-gradient(#37474f 15%, transparent 16%), radial-gradient(#37474f 15%, transparent 16%);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
            transform: rotateY(180deg);
        }

        /* Емодзі на картці */
        .emoji-item {
            font-size: 80px;
            filter: drop-shadow(4px 4px 0px #000);
            transition: transform 0.3s;
        }
        
        .emoji-item:hover {
            transform: scale(1.2) rotate(10deg);
        }

        /* Кнопка "Нова картка" */
        #new-card-btn {
            position: absolute;
            bottom: 30px;
            right: 40px;
            background-color: #ff3d00;
            color: #fff;
            border: 6px solid #000;
            padding: 15px 40px;
            font-size: 32px;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 8px 8px 0 #000;
            text-transform: uppercase;
            transform: skewX(-10deg);
            transition: all 0.2s;
            font-family: 'Propysy Bold', 'Impact', sans-serif;
            z-index: 10;
        }

        #new-card-btn:active {
            transform: skewX(-10deg) translate(8px, 8px);
            box-shadow: 0px 0px 0 #000;
        }

        /* Інтерактивний персонаж: Кажан у польоті */
        #bat-character {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 300px;
            height: auto;
            z-index: 10;
            pointer-events: none;
            filter: drop-shadow(10px 10px 0px rgba(0,0,0,0.5));
            animation: hoverBat 3s ease-in-out infinite;
        }

        @keyframes hoverBat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(-3deg); }
        }

        /* Анімація крил */
        #left-wing { animation: flapLeft 0.3s ease-in-out infinite alternate; transform-origin: 60% 50%; }
        #right-wing { animation: flapRight 0.3s ease-in-out infinite alternate; transform-origin: 40% 50%; }
        
        @keyframes flapLeft { from { transform: rotate(0deg); } to { transform: rotate(25deg); } }
        @keyframes flapRight { from { transform: rotate(0deg); } to { transform: rotate(-25deg); } }

        /* Анімація реакції персонажа */
        .reacting #bat-eyes { fill: #ffeb3b !important; }
        .reacting { animation: excite 0.5s !important; }
        @keyframes excite {
            0% { transform: scale(1); }
            50% { transform: scale(1.3) translateY(-40px); }
            100% { transform: scale(1); }
        }

        /* Елементи коміксного екшену (BOOM, ZAP) */
        .action-bubble {
            position: absolute;
            font-size: 60px;
            color: #ffeb3b;
            text-shadow: 5px 5px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;
            opacity: 0;
            pointer-events: none;
            z-index: 20;
            transform: scale(0);
        }

        .show-bubble {
            animation: popBubble 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popBubble {
            0% { transform: scale(0) rotate(-20deg); opacity: 0; }
            50% { transform: scale(1.5) rotate(10deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <!-- Лічильник на 2 гравця -->
    <div id="scoreboard">
        <div class="player-panel">
            <input type="text" class="player-name" value="ГРАВЕЦЬ 1" maxlength="12">
            <div class="score-display">
                <button class="score-btn minus" onclick="updateScore(1, -1)">-</button>
                <span class="score-value" id="score1">0</span>
                <button class="score-btn plus" onclick="updateScore(1, 1)">+</button>
            </div>
        </div>
        <div class="player-panel">
            <input type="text" class="player-name" value="ГРАВЕЦЬ 2" maxlength="12">
            <div class="score-display">
                <button class="score-btn minus" onclick="updateScore(2, -1)">-</button>
                <span class="score-value" id="score2">0</span>
                <button class="score-btn plus" onclick="updateScore(2, 1)">+</button>
            </div>
        </div>
    </div>

    <!-- Ігрова зона -->
    <div id="game-area">
        <!-- Деталізований SVG персонаж: Кажан у польоті -->
        <svg id="bat-character" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <!-- Ліве крило -->
            <path id="left-wing" d="M100,100 Q40,40 10,60 Q30,90 20,130 Q60,110 100,100" fill="#311b92" stroke="#000" stroke-width="4" stroke-linejoin="round"/>
            <!-- Праве крило -->
            <path id="right-wing" d="M100,100 Q160,40 190,60 Q170,90 180,130 Q140,110 100,100" fill="#311b92" stroke="#000" stroke-width="4" stroke-linejoin="round"/>
            <!-- Тіло та голова -->
            <ellipse cx="100" cy="110" rx="25" ry="30" fill="#4527a0" stroke="#000" stroke-width="4"/>
            <circle cx="100" cy="85" r="22" fill="#5e35b1" stroke="#000" stroke-width="4"/>
            <!-- Вуха -->
            <path d="M85,70 L75,40 L95,65 Z" fill="#5e35b1" stroke="#000" stroke-width="3"/>
            <path d="M115,70 L125,40 L105,65 Z" fill="#5e35b1" stroke="#000" stroke-width="3"/>
            <!-- Очі -->
            <g id="bat-eyes" fill="#fff">
                <ellipse cx="92" cy="82" rx="6" ry="8" stroke="#000" stroke-width="2"/>
                <ellipse cx="108" cy="82" rx="6" ry="8" stroke="#000" stroke-width="2"/>
                <circle cx="92" cy="82" r="2" fill="#000"/>
                <circle cx="108" cy="82" r="2" fill="#000"/>
            </g>
            <!-- Рот (ікла) -->
            <path d="M95,95 Q100,100 105,95" fill="none" stroke="#000" stroke-width="2"/>
            <path d="M96,95 L98,102 L100,95" fill="#fff" stroke="#000" stroke-width="1"/>
            <path d="M100,95 L102,102 L104,95" fill="#fff" stroke="#000" stroke-width="1"/>
        </svg>

        <!-- Картка -->
        <div class="card-container" id="card" onclick="flipCard()">
            <div class="card" id="card-inner">
                <div class="card-face card-front" id="front-face">
                    <!-- Емодзі генеруються тут -->
                </div>
                <div class="card-face card-back" id="back-face">
                    <!-- Залишок емодзі генерується тут -->
                </div>
            </div>
        </div>
        
        <!-- Ефект вибуху для коміксу -->
        <div class="action-bubble" id="action-text">ZAP!</div>

        <button id="new-card-btn" onclick="generateNewCard()">Нова картка</button>
    </div>

    <script>
        // Рівно 50 емодзі для гри 
        const emojiPool = [
            '🍎','🍐','🍊','🍋','🍌','🍉','🍇','🍓','🍈','🍒',
            '🍑','🥭','🍍','🥥','🥝','🍅','🍆','🥑','🥦','🥬',
            '🥒','🌶','🌽','🥕','🥔','🍠','🥐','🍞','🥖','🥨',
            '🧀','🥚','🍳','🥞','🥓','🥩','🍗','🍖','🌭','🍔',
            '🍟','🍕','🥪','🥙','🌮','🌯','🥗','🥘','🥫','🍝'
        ];

        let currentCardEmojis = [];
        let isFlipped = false;
        
        // Аудіо контекст для генерації звуків "на льоту" (без файлів)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        // Функція програвання синтезованих звуків
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (type === 'flip') {
                // Звук "вжик" для перегортання
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(400, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.15);
                gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.15);
            } else if (type === 'click') {
                // Звук кліку лічильника
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(600, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'magic') {
                // Звук появи нової картки
                oscillator.type = 'triangle';
                oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
                oscillator.frequency.linearRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                oscillator.frequency.linearRampToValueAtTime(400, audioCtx.currentTime + 0.2);
                gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.2);
            }
        }

        // Логіка оновлення рахунку
        const scores = { 1: 0, 2: 0 };
        function updateScore(player, change) {
            playSound('click');
            scores[player] += change;
            if (scores[player] < 0) scores[player] = 0; // Не даємо піти в мінус
            document.getElementById('score' + player).innerText = scores[player];
            
            // Анімація цифри
            const scoreEl = document.getElementById('score' + player);
            scoreEl.style.transform = 'scale(1.5)';
            setTimeout(() => { scoreEl.style.transform = 'scale(1)'; }, 150);
        }

        // Перемішування масиву (Алгоритм Фішера-Єтса)
        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        // Отримання 6 випадкових унікальних емодзі
        function getRandomEmojis() {
            const shuffledPool = shuffle([...emojiPool]);
            return shuffledPool.slice(0, 6);
        }

        // Рендер емодзі у контейнер
        function renderEmojis(containerId, emojisList) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            // Щоб вони хаотично міняли положення, задаємо випадковий order для flexbox
            const styledEmojis = emojisList.map(emoji => {
                const randomOrder = Math.floor(Math.random() * 20);
                return `<div class="emoji-item" style="order: ${randomOrder};">${emoji}</div>`;
            });
            
            container.innerHTML = styledEmojis.join('');
        }

        // Генерація нової картки (початковий стан)
        function generateNewCard() {
            playSound('magic');
            
            const cardInner = document.getElementById('card-inner');
            if (isFlipped) {
                cardInner.classList.remove('flipped');
                isFlipped = false;
                
                // Чекаємо завершення анімації перегортання перед зміною вмісту
                setTimeout(() => {
                    setupCardData();
                }, 400); 
            } else {
                setupCardData();
            }
            
            // Анімація реакції кажана на нову картку
            const bat = document.getElementById('bat-character');
            bat.classList.add('reacting');
            setTimeout(() => bat.classList.remove('reacting'), 500);
        }

        // Підготовка даних для картки
        function setupCardData() {
            currentCardEmojis = getRandomEmojis();
            renderEmojis('front-face', currentCardEmojis);
            
            // Одразу готуємо зворотний бік (мінус один елемент + перемішування)
            let backEmojis = [...currentCardEmojis];
            const removeIndex = Math.floor(Math.random() * backEmojis.length);
            backEmojis.splice(removeIndex, 1);
            renderEmojis('back-face', backEmojis);
        }

        // Перегортання картки по кліку (тепер можна перегортати туди-сюди)
        function flipCard() {
            playSound('flip');
            const cardInner = document.getElementById('card-inner');
            
            if (isFlipped) {
                cardInner.classList.remove('flipped');
                isFlipped = false;
            } else {
                cardInner.classList.add('flipped');
                isFlipped = true;
            }

            // Коміксний спецефект при кожному перегортанні
            const actionText = document.getElementById('action-text');
            const texts = ['POOF!', 'ZAP!', 'WHOOSH!', 'BAM!'];
            actionText.innerText = texts[Math.floor(Math.random() * texts.length)];
            
            // Позиціонуємо ефект випадково біля картки
            actionText.style.top = (Math.random() * 40 + 30) + '%';
            actionText.style.left = (Math.random() * 40 + 30) + '%';
            
            actionText.classList.remove('show-bubble');
            void actionText.offsetWidth; // Тригер reflow для перезапуску анімації
            actionText.classList.add('show-bubble');

            // Радісна реакція персонажа
            const bat = document.getElementById('bat-character');
            bat.classList.add('reacting');
            setTimeout(() => bat.classList.remove('reacting'), 500);
        }

        // Запуск гри при завантаженні
        window.onload = generateNewCard;

    </script>
</body>
</html>
