<script>
// ---------- Глобальні змінні ----------
let isEditMode = false;
let selectedElement = null;
let activeDragEl = null, dragStartX, dragStartY, dragInitX, dragInitY;
let memoryLockBoard = false, memoryFirstCard = null, memorySecondCard = null;
let globalVolume = 0.5;
let activePairTarget = null;
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let currentCustomAudio = null;
const pArea = document.getElementById('presentation-area');
const mainToggle = document.getElementById('main-mode-toggle');
const volumeSlider = document.getElementById('volume-slider');
volumeSlider?.addEventListener('input', e => globalVolume = parseFloat(e.target.value));
// Допоміжні функції
function getActiveSlide() { return pArea.querySelector('.slide.active'); }
function rgbToHex(rgb) { let m = rgb.match(/^rgba?\((\d+),\s*(\d+),\s*(\d+)/); return m ? "#" + ("0"+parseInt(m[1]).toString(16)).slice(-2)+("0"+parseInt(m[2]).toString(16)).slice(-2)+("0"+parseInt(m[3]).toString(16)).slice(-2) : "#000000"; }
// Звуки з гучністю
function playSound(type, customBase64 = null) {
if(audioCtx.state === 'suspended') audioCtx.resume();
const now = audioCtx.currentTime;
if(type === 'custom' && customBase64) {
if(currentCustomAudio) currentCustomAudio.pause();
currentCustomAudio = new Audio(customBase64);
currentCustomAudio.volume = globalVolume;
currentCustomAudio.play();
return;
}
const osc = audioCtx.createOscillator();
const gain = audioCtx.createGain();
osc.connect(gain); gain.connect(audioCtx.destination);
gain.gain.value = globalVolume * 0.5;
if(type === 'swipe') {
osc.type = 'sine';
osc.frequency.setValueAtTime(200, now);
osc.frequency.exponentialRampToValueAtTime(600, now+0.2);
gain.gain.setValueAtTime(globalVolume*0.2, now);
gain.gain.linearRampToValueAtTime(globalVolume*0.4, now+0.1);
gain.gain.linearRampToValueAtTime(0, now+0.2);
osc.start(now); osc.stop(now+0.2);
} else if(type === 'pop') {
osc.type = 'square';
osc.frequency.setValueAtTime(400, now);
gain.gain.setValueAtTime(globalVolume*0.3, now);
gain.gain.exponentialRampToValueAtTime(0.01, now+0.1);
osc.start(now); osc.stop(now+0.1);
} else if(type === 'magic') {
[400,523,659,880].forEach((f,i)=>{
const o=audioCtx.createOscillator(), g=audioCtx.createGain();
o.type='sine'; o.frequency.value=f; o.connect(g); g.connect(audioCtx.destination);
g.gain.setValueAtTime(0, now+i*0.08);
g.gain.linearRampToValueAtTime(globalVolume*0.3, now+i*0.08+0.05);
g.gain.linearRampToValueAtTime(0, now+i*0.08+0.5);
o.start(now+i*0.08); o.stop(now+i*0.08+0.5);
});
} else if(type === 'error') {
osc.type='sawtooth'; osc.frequency.setValueAtTime(150,now);
gain.gain.setValueAtTime(globalVolume*0.2,now);
gain.gain.linearRampToValueAtTime(0, now+0.3);
osc.start(now); osc.stop(now+0.3);
} else if(type === 'win-game') {
[261.63,329.63,392.00,523.25].forEach((f,i)=>{
const o=audioCtx.createOscillator(), g=audioCtx.createGain();
o.type='square'; o.frequency.value=f; o.connect(g); g.connect(audioCtx.destination);
g.gain.setValueAtTime(globalVolume*0.2, now+i*0.15);
g.gain.linearRampToValueAtTime(0, now+i*0.15+0.3);
o.start(now+i*0.15); o.stop(now+i*0.15+0.3);
});
}
}
function fireParticles(x,y){
if(!document.body.animate) return;
for(let i=0;i<25;i++){
const p=document.createElement('div'); p.className='particle'; p.innerText='  ⭐  ';
p.style.left=x+'px'; p.style.top=y+'px'; p.style.fontSize=(10+Math.random()*20)+'px';
document.body.appendChild(p);
const angle=Math.random()*Math.PI*2, vel=50+Math.random()*150;
let tx=Math.cos(angle)*vel, ty=Math.sin(angle)*vel - Math.random()*100;
const anim=p.animate([{transform:'translate(0,0) scale(1)',opacity:1},{transform:`translate(${tx}px, ${ty}px) scale(0)`,opacity:0}],{duration:600+Math.random()*400});
anim.onfinish=()=>p.remove();
}
}
// ---------- Робота з Memory ----------
function updateMemoryBoardBg(board){
const hex=board.dataset.boardColor||'#ffffff';
const op=board.dataset.boardOpacity!==undefined?board.dataset.boardOpacity:'0.3';
let r=parseInt(hex.slice(1,3),16)||255, g=parseInt(hex.slice(3,5),16)||255, b=parseInt(hex.slice(5,7),16)||255;
board.style.backgroundColor=`rgba(${r},${g},${b},${op})`;
}
function updateMemoryShirts(board){
const color=board.dataset.shirtColor||'#ffffff';
const pattern=board.dataset.shirtPattern||'none';
const customImg=board.dataset.shirtImg;
board.querySelectorAll('.memory-card-front').forEach(front=>{
front.innerHTML='';
front.style.backgroundImage='';
front.style.setProperty('background-color',color,'important');
front.style.backgroundSize=''; front.style.backgroundRepeat=''; front.style.backgroundPosition='';
if(customImg){
front.style.backgroundColor='transparent';
const img=document.createElement('img'); img.src=customImg;
img.style.maxWidth='90%'; img.style.maxHeight='90%'; img.style.objectFit='contain';
front.appendChild(img);
} else {
let bg='none', sz='auto';
if(pattern==='stripes') bg='repeating-linear-gradient(45deg, rgba(0,0,0,0.1) 0, rgba(0,0,0,0.1) 15px, transparent 15px, transparent 30px)';
else if(pattern==='dots'){ bg='radial-gradient(circle, rgba(0,0,0,0.15) 20%, transparent 21%)'; sz='30px 30px'; }
else if(pattern==='grid'){ bg='linear-gradient(rgba(0,0,0,0.1) 2px, transparent 2px), linear-gradient(90deg, rgba(0,0,0,0.1) 2px, transparent 2px)'; sz='30px 30px'; }
else if(pattern==='diagonal') bg='repeating-linear-gradient(45deg, rgba(0,0,0,0.08) 0, rgba(0,0,0,0.08) 2px, transparent 2px, transparent 12px), repeating-linear-gradient(-45deg, rgba(0,0,0,0.08) 0, rgba(0,0,0,0.08) 2px, transparent 2px, transparent 12px)';
if(bg!=='none'){ front.style.backgroundImage=bg; front.style.backgroundSize=sz; front.style.backgroundRepeat='repeat'; front.style.backgroundPosition='center'; }
}
});
}
function buildMemoryGrid(el){
el.innerHTML='';
const [cols,rows]=el.dataset.gridSize.split('x').map(Number);
const totalCards=cols*rows;
el.style.gridTemplateColumns=`repeat(${cols}, 1fr)`;
el.style.gridTemplateRows=`repeat(${rows}, 1fr)`;
const animClass=el.dataset.animType;
let pairsData=JSON.parse(el.dataset.pairsData||'[]');
const cardBg=el.dataset.cardBgColor||'#ffffff';
const fontFam=el.dataset.memFont||'sans-serif', fontSize=el.dataset.memFontSize||'40', fontCol=el.dataset.memColor||'#333', fontWgt=el.dataset.memBold==='true'?'bold':'normal';
let html='', curPair=0;
for(let i=0;i<totalCards;i++){
let isSecond=i%2!==0;
let data=isSecond?pairsData[curPair].b:pairsData[curPair].a;
let content='';
if(data.type==='image'){
const fit = data.fit || ((data.val.startsWith('data:image/png')||data.val.startsWith('data:image/gif')||data.val.startsWith('data:image/webp'))?'contain':'cover');
content=`<img src="${data.val}" style="width:100%; height:100%; object-fit:${fit}; padding:${fit==='contain'?'5px':'0'}; pointer-events:none;">`;
} else {
let txt=data.val.trim()===''?'?':data.val;
content=`<div style="font-family:${fontFam}; font-size:${fontSize}px; color:${fontCol}; font-weight:${fontWgt}; width:100%; height:100%; display:flex; align-items:center; justify-content:center;">${txt}</div>`;
}
html+=`<div class="memory-card ${animClass} ${isEditMode?'is-flipped':''}" data-pair-id="${curPair}"><div class="memory-card-inner"><div class="memory-card-front"></div><div class="memory-card-back" style="background-color:${cardBg};">${content}</div></div></div>`;
if(isSecond) curPair++;
}
el.innerHTML=html;
updateMemoryShirts(el);
}
function shuffleMemoryBoard(board){
const cards=Array.from(board.querySelectorAll('.memory-card'));
cards.forEach(c=>c.classList.remove('is-flipped','is-matched'));
for(let i=cards.length-1;i>0;i--){ let j=Math.floor(Math.random()*(i+1)); cards[j].parentNode.appendChild(cards[j]); }
board.dataset.matchedPairs='0';
memoryLockBoard=false; memoryFirstCard=null; memorySecondCard=null;
}
// ---------- Рендер менеджера пар ----------
function renderPairManager(el){
const container=document.getElementById('mem-pairs-container');
container.innerHTML='';
const [cols,rows]=el.dataset.gridSize.split('x').map(Number);
const totalPairs=(cols*rows)/2;
let pairsData=JSON.parse(el.dataset.pairsData||'[]');
for(let i=0;i<totalPairs;i++){
let pData=pairsData[i]||{a:{type:'text',val:''},b:{type:'text',val:''}};
const row=document.createElement('div'); row.className='pair-row';
row.innerHTML=`<div class="pair-header"><span>Пара ${i+1}</span></div>`;
const content=document.createElement('div'); content.className='pair-content';
['a','b'].forEach(side=>{
const box=document.createElement('div');
const hasData=!!pData[side].val.trim();
box.className=`pair-box ${hasData?'has-content':''}`;
if(hasData){
if(pData[side].type==='image') box.innerHTML=`<img src="${pData[side].val}">`;
else box.innerText=pData[side].val.substring(0,15)+(pData[side].val.length>15?'...':'');
const btn=document.createElement('button'); btn.className='clear-pair-btn'; btn.innerText='  ❌  ';
btn.onclick=()=>{ if(selectedElement){ let d=JSON.parse(selectedElement.dataset.pairsData); d[i][side]={type:'text',val:''}; selectedElement.dataset.pairsData=JSON.stringify(d); renderPairManager(selectedElement); buildMemoryGrid(selectedElement); } };
box.appendChild(btn);
} else {
box.innerHTML=`<div class="pair-actions"><button onclick="window.triggerPairImage(${i},'${side}')">  🖼  ️</button><button onclick="window.promptPairText(${i},'${side}')">  📝  </button></div>`;
}
content.appendChild(box);
});
row.appendChild(content); container.appendChild(row);
}
}
window.triggerPairImage=function(idx,side){
activePairTarget={index:idx,side:side};
document.getElementById('pair-image-input')?.click();
};
window.promptPairText=function(idx,side){
activePairTarget={index:idx,side:side};
let pairsData=JSON.parse(selectedElement.dataset.pairsData);
document.getElementById('pair-text-input').value=pairsData[idx][side].type==='text'?pairsData[idx][side].val:'';
document.getElementById('text-prompt-modal').style.display='flex';
};
document.getElementById('pair-image-input')?.addEventListener('change',e=>{
if(!e.target.files[0]||!activePairTarget||!selectedElement) return;
const reader=new FileReader();
reader.onload=ev=>{ let d=JSON.parse(selectedElement.dataset.pairsData); d[activePairTarget.index][activePairTarget.side]={type:'image',val:ev.target.result}; selectedElement.dataset.pairsData=JSON.stringify(d); renderPairManager(selectedElement); buildMemoryGrid(selectedElement); };
reader.readAsDataURL(e.target.files[0]); e.target.value='';
});
document.getElementById('save-pair-text-btn')?.addEventListener('click',()=>{
if(!activePairTarget||!selectedElement) return;
let txt=document.getElementById('pair-text-input').value.trim();
let d=JSON.parse(selectedElement.dataset.pairsData);
d[activePairTarget.index][activePairTarget.side]={type:'text',val:txt};
selectedElement.dataset.pairsData=JSON.stringify(d);
document.getElementById('text-prompt-modal').style.display='none';
renderPairManager(selectedElement); buildMemoryGrid(selectedElement);
});
// ---------- Події інтерфейсу ----------
function selectElement(el){
if(selectedElement) selectedElement.classList.remove('selected');
selectedElement=el; selectedElement.classList.add('selected');
document.getElementById('properties-panel').style.display='block';
document.getElementById('prop-text-group').style.display='none';
document.getElementById('prop-memory-group').style.display='none';
if(el.dataset.type==='text'){
document.getElementById('prop-text-group').style.display='block';
document.getElementById('prop-text').value=el.innerText;
document.getElementById('prop-font').value=el.style.fontFamily||'sans-serif';
document.getElementById('prop-fontsize').value=parseInt(el.style.fontSize)||24;
document.getElementById('prop-color').value=rgbToHex(el.style.color||'#000');
document.getElementById('prop-bold').checked=el.style.fontWeight==='bold';
} else if(el.dataset.type==='memory'){
document.getElementById('prop-memory-group').style.display='block';
document.getElementById('mem-grid-size').value=el.dataset.gridSize||'4x3';
document.getElementById('mem-shirt-color').value=el.dataset.shirtColor||'#ffffff';
document.getElementById('mem-shirt-pattern').value=el.dataset.shirtPattern||'none';
document.getElementById('mem-anim').value=el.dataset.animType||'anim-flipY';
document.getElementById('mem-sound').value=el.dataset.sound||'swipe';
document.getElementById('mem-board-color').value=el.dataset.boardColor||'#ffffff';
document.getElementById('mem-board-opacity').value=el.dataset.boardOpacity!==undefined?el.dataset.boardOpacity:'0.3';
document.getElementById('mem-card-bg-color').value=el.dataset.cardBgColor||'#ffffff';
document.getElementById('mem-font-family').value=el.dataset.memFont||'sans-serif';
document.getElementById('mem-font-size').value=el.dataset.memFontSize||'40';
document.getElementById('mem-font-color').value=el.dataset.memColor||'#333333';
document.getElementById('mem-font-bold').checked=el.dataset.memBold==='true';
renderPairManager(el);
}
}
function deselectElement(){ if(selectedElement) selectedElement.classList.remove('selected'); selectedElement=null; document.getElementById('properties-panel').style.display='none'; }
// Додавання елементів
document.getElementById('add-text-btn')?.addEventListener('click',()=>{
const el=document.createElement('div'); el.className='element draggable'; el.dataset.type='text'; el.innerText='Введіть текст';
el.style.left='100px'; el.style.top='100px'; el.style.fontSize='30px'; el.style.fontFamily='sans-serif'; el.style.color='#000';
getActiveSlide().appendChild(el); selectElement(el);
});
document.getElementById('add-image-btn')?.addEventListener('click',()=>document.getElementById('global-image-input').click());
document.getElementById('global-image-input')?.addEventListener('change',e=>{
if(!e.target.files[0]) return;
const reader=new FileReader();
reader.onload=ev=>{
const el=document.createElement('div'); el.className='element draggable'; el.dataset.type='image';
el.style.left='100px'; el.style.top='100px'; el.style.width='200px'; el.style.height='200px'; el.style.resize='both';
const img=new Image(); img.src=ev.target.result; img.style.width='100%'; img.style.height='100%'; img.style.objectFit='contain'; img.style.pointerEvents='none';
el.appendChild(img); getActiveSlide().appendChild(el); selectElement(el);
};
reader.readAsDataURL(e.target.files[0]); e.target.value='';
});
document.getElementById('add-memory-btn')?.addEventListener('click',()=>{
const el=document.createElement('div'); el.className='element draggable memory-board'; el.dataset.type='memory';
el.style.left='50px'; el.style.top='50px'; el.style.width='600px'; el.style.height='400px';
el.dataset.gridSize='4x3'; el.dataset.boardColor='#ffffff'; el.dataset.boardOpacity='0.3';
el.dataset.shirtColor='#ffffff'; el.dataset.shirtPattern='none'; el.dataset.animType='anim-flipY'; el.dataset.sound='swipe';
el.dataset.cardBgColor='#ffffff'; el.dataset.memFont='sans-serif'; el.dataset.memFontSize='40'; el.dataset.memColor='#333333'; el.dataset.memBold='true';
let initPairs=Array(15).fill().map(()=>({a:{type:'text',val:''},b:{type:'text',val:''}}));
el.dataset.pairsData=JSON.stringify(initPairs);
getActiveSlide().appendChild(el); selectElement(el);
updateMemoryBoardBg(el); buildMemoryGrid(el);
});
// Інші кнопки toolbar
document.getElementById('del-btn')?.addEventListener('click',()=>{ if(selectedElement){ selectedElement.remove(); deselectElement(); } });
document.getElementById('layer-up')?.addEventListener('click',()=>{ if(selectedElement) selectedElement.style.zIndex=(parseInt(selectedElement.style.zIndex||1)+1).toString(); });
document.getElementById('layer-down')?.addEventListener('click',()=>{ if(selectedElement) selectedElement.style.zIndex=Math.max(0,parseInt(selectedElement.style.zIndex||1)-1).toString(); });
document.getElementById('center-btn')?.addEventListener('click',()=>{ if(selectedElement){ selectedElement.style.left=(pArea.clientWidth-selectedElement.offsetWidth)/2+'px'; selectedElement.style.top=(pArea.clientHeight-selectedElement.offsetHeight)/2+'px'; } });
document.getElementById('prop-text')?.addEventListener('input',e=>{ if(selectedElement&&selectedElement.dataset.type==='text') selectedElement.innerText=e.target.value; });
document.getElementById('prop-font')?.addEventListener('change',e=>{ if(selectedElement) selectedElement.style.fontFamily=e.target.value; });
document.getElementById('prop-fontsize')?.addEventListener('input',e=>{ if(selectedElement) selectedElement.style.fontSize=e.target.value+'px'; });
document.getElementById('prop-color')?.addEventListener('input',e=>{ if(selectedElement) selectedElement.style.color=e.target.value; });
document.getElementById('prop-bold')?.addEventListener('change',e=>{ if(selectedElement) selectedElement.style.fontWeight=e.target.checked?'bold':'normal'; });
// Налаштування memory
document.getElementById('mem-grid-size')?.addEventListener('change',e=>{ if(selectedElement){ selectedElement.dataset.gridSize=e.target.value; renderPairManager(selectedElement); buildMemoryGrid(selectedElement); } });
document.getElementById('mem-shirt-color')?.addEventListener('input',e=>{ if(selectedElement){ selectedElement.dataset.shirtColor=e.target.value; updateMemoryShirts(selectedElement); } });
document.getElementById('mem-shirt-pattern')?.addEventListener('change',e=>{ if(selectedElement){ selectedElement.dataset.shirtPattern=e.target.value; delete selectedElement.dataset.shirtImg; document.getElementById('mem-shirt-img').value=''; updateMemoryShirts(selectedElement); } });
document.getElementById('mem-anim')?.addEventListener('change',e=>{ if(selectedElement){ selectedElement.dataset.animType=e.target.value; buildMemoryGrid(selectedElement); } });
document.getElementById('mem-sound')?.addEventListener('change',e=>{ if(selectedElement) selectedElement.dataset.sound=e.target.value; document.getElementById('mem-custom-sound').style.display=e.target.value==='custom'?'block':'none'; });
document.getElementById('mem-custom-sound')?.addEventListener('change',e=>{ if(!e.target.files[0]||!selectedElement) return; const reader=new FileReader(); reader.onload=ev=>{ selectedElement.dataset.customSoundBase64=ev.target.result; }; reader.readAsDataURL(e.target.files[0]); });
document.getElementById('mem-shirt-img')?.addEventListener('change',e=>{ if(!e.target.files[0]||!selectedElement) return; const reader=new FileReader(); reader.onload=ev=>{ selectedElement.dataset.shirtImg=ev.target.result; document.getElementById('mem-shirt-pattern').value='none'; selectedElement.dataset.shirtPattern='none'; updateMemoryShirts(selectedElement); }; reader.readAsDataURL(e.target.files[0]); });
document.getElementById('mem-board-color')?.addEventListener('input',e=>{ if(selectedElement){ selectedElement.dataset.boardColor=e.target.value; updateMemoryBoardBg(selectedElement); } });
document.getElementById('mem-board-opacity')?.addEventListener('input',e=>{ if(selectedElement){ selectedElement.dataset.boardOpacity=e.target.value; updateMemoryBoardBg(selectedElement); } });
document.getElementById('mem-card-bg-color')?.addEventListener('input',e=>{ if(selectedElement){ selectedElement.dataset.cardBgColor=e.target.value; buildMemoryGrid(selectedElement); } });
['mem-font-family','mem-font-size','mem-font-color','mem-font-bold'].forEach(id=>{
document.getElementById(id)?.addEventListener('input',e=>{ if(!selectedElement) return;
if(id==='mem-font-family') selectedElement.dataset.memFont=e.target.value;
if(id==='mem-font-size') selectedElement.dataset.memFontSize=e.target.value;
if(id==='mem-font-color') selectedElement.dataset.memColor=e.target.value;
if(id==='mem-font-bold') selectedElement.dataset.memBold=e.target.checked;
buildMemoryGrid(selectedElement);
});
});
// Перетягування
pArea.addEventListener('mousedown',e=>{
if(!isEditMode||e.button!==0) return;
const target=e.target.closest('.element');
if(target){ activeDragEl=target; dragStartX=e.clientX; dragStartY=e.clientY; dragInitX=activeDragEl.offsetLeft; dragInitY=activeDragEl.offsetTop; selectElement(activeDragEl); }
else deselectElement();
});
document.addEventListener('mousemove',e=>{ if(activeDragEl&&isEditMode){ activeDragEl.style.left=dragInitX+(e.clientX-dragStartX)+'px'; activeDragEl.style.top=dragInitY+(e.clientY-dragStartY)+'px'; } });
document.addEventListener('mouseup',()=>{ activeDragEl=null; });
// Слайди
function updateSlideCounter(){ let slides=pArea.querySelectorAll('.slide'); let idx=Array.from(slides).indexOf(getActiveSlide())+1; let sc=document.getElementById('slide-counter'); if(sc) sc.innerText=`Слайд ${idx} з ${slides.length}`; }
function goToSlide(dir){ let slides=pArea.querySelectorAll('.slide'); let cur=Array.from(slides).indexOf(getActiveSlide()); let n=cur+dir; if(n>=0&&n<slides.length){ slides[cur].classList.remove('active'); slides[n].classList.add('active'); deselectElement(); updateSlideCounter(); } }
document.getElementById('add-slide-btn')?.addEventListener('click',()=>{ let ns=document.createElement('div'); ns.className='slide'; pArea.appendChild(ns); goToSlide(1); });
document.getElementById('del-slide-btn')?.addEventListener('click',()=>{ if(!confirm('Видалити слайд?')) return; let slides=pArea.querySelectorAll('.slide'); if(slides.length===1){ getActiveSlide().innerHTML=''; getActiveSlide().style.background='white'; return; } let active=getActiveSlide(); goToSlide(-1); if(getActiveSlide()===active) goToSlide(1); active.remove(); updateSlideCounter(); });
document.getElementById('prev-slide-btn')?.addEventListener('click',()=>goToSlide(-1));
document.getElementById('next-slide-btn')?.addEventListener('click',()=>goToSlide(1));
document.getElementById('slide-bg-color')?.addEventListener('input',e=>{ getActiveSlide().style.backgroundColor=e.target.value; getActiveSlide().style.backgroundImage='none'; });
document.getElementById('bg-image-trigger')?.addEventListener('click',()=>document.getElementById('bg-image-input').click());
document.getElementById('bg-image-input')?.addEventListener('change',e=>{ if(e.target.files[0]){ let r=new FileReader(); r.onload=ev=>{ getActiveSlide().style.backgroundImage=`url(${ev.target.result})`; }; r.readAsDataURL(e.target.files[0]); } });
document.getElementById('add-pdf-btn')?.addEventListener('click',()=>document.getElementById('pdf-file-input').click());
document.getElementById('pdf-file-input')?.addEventListener('change',async e=>{ let file=e.target.files[0]; if(!file) return; let btn=document.getElementById('add-pdf-btn'); btn.innerText='  ⏳  '; btn.disabled=true; try{ let ab=await file.arrayBuffer(); let pdf=await pdfjsLib.getDocument({data:ab}).promise; for(let i=1;i<=pdf.numPages;i++){ if(getActiveSlide().children.length>0||getActiveSlide().style.backgroundImage!=='') document.getElementById('add-slide-btn')?.click(); let page=await pdf.getPage(i); let viewport=page.getViewport({scale:1.5}); let canvas=document.createElement('canvas'); canvas.width=viewport.width; canvas.height=viewport.height; let ctx=canvas.getContext('2d'); await page.render({canvasContext:ctx,viewport:viewport}).promise; getActiveSlide().style.backgroundImage=`url(${canvas.toDataURL('image/webp',0.8)})`; } } catch(err){ alert('Помилка PDF: '+err.message); } btn.innerText='  📄   Зробити з PDF'; btn.disabled=false; e.target.value=''; });
// Експорт
document.getElementById('export-btn')?.addEventListener('click',async()=>{
deselectElement();
let wasEdit=isEditMode;
if(wasEdit) mainToggle?.click();
let expBtn = document.getElementById('export-btn');
if(expBtn) { expBtn.innerText='  ⏳     Оптимізація  ...'; expBtn.disabled=true; }
try{
const compressImage = (src) => new Promise(res => {
if (!src || !src.startsWith('data:image/') || src.startsWith('data:image/webp')) return res(src);
let img = new Image();
img.onload = () => {
let canvas = document.createElement('canvas'); canvas.width = img.naturalWidth; canvas.height = img.naturalHeight;
let ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0); res(canvas.toDataURL('image/webp', 0.7));
};
img.onerror = () => res(src);
img.src = src;
});
const allImgs=pArea.querySelectorAll('img');
for(let img of allImgs){ img.src = await compressImage(img.src); }
const slides = pArea.querySelectorAll('.slide');
for(let s of slides){
if(s.style.backgroundImage && s.style.backgroundImage.includes('data:image/')){
let m = s.style.backgroundImage.match(/url\(['"]?(data:image\/[^'"]+)['"]?\)/);
if(m && m[1]){ let webp = await compressImage(m[1]); s.style.backgroundImage = `url(${webp})`; }
}
}
const memBoards = pArea.querySelectorAll('.memory-board');
for(let b of memBoards){
if(b.dataset.shirtImg) b.dataset.shirtImg = await compressImage(b.dataset.shirtImg);
if(b.dataset.pairsData){
let pairs = JSON.parse(b.dataset.pairsData);
for(let p of pairs){
if(p.a.type === 'image' && p.a.val) { p.a.fit = p.a.fit || ((p.a.val.startsWith('data:image/png')||p.a.val.startsWith('data:image/gif')||p.a.val.startsWith('data:image/webp'))?'contain':'cover'); p.a.val = await compressImage(p.a.val); }
if(p.b.type === 'image' && p.b.val) { p.b.fit = p.b.fit || ((p.b.val.startsWith('data:image/png')||p.b.val.startsWith('data:image/gif')||p.b.val.startsWith('data:image/webp'))?'contain':'cover'); p.b.val = await compressImage(p.b.val); }
}
b.dataset.pairsData = JSON.stringify(pairs);
}
buildMemoryGrid(b);
}
const boards=pArea.querySelectorAll('.memory-board[data-custom-sound-base64]');
for(let b of boards){
let src=b.dataset.customSoundBase64;
if(src&&src.startsWith('data:audio/')&&!src.startsWith('data:audio/mp3')){
try{
let res=await fetch(src), ab=await res.arrayBuffer();
let actx=new (window.AudioContext||window.webkitAudioContext)();
let buf=await actx.decodeAudioData(ab);
let offline=new OfflineAudioContext(1,buf.duration*44100,44100);
let srcNode=offline.createBufferSource(); srcNode.buffer=buf; srcNode.connect(offline.destination); srcNode.start();
let rendered=await offline.startRendering();
let samples=rendered.getChannelData(0);
let int16=new Int16Array(samples.length);
for(let i=0;i<samples.length;i++){ let s=Math.max(-1,Math.min(1,samples[i])); int16[i]=s<0?s*0x8000:s*0x7FFF; }
let mp3encoder=new lamejs.Mp3Encoder(1,44100,64);
let mp3data=[], block=1152;
for(let i=0;i<int16.length;i+=block){ let chunk=int16.subarray(i,i+block); let mp3buf=mp3encoder.encodeBuffer(chunk); if(mp3buf.length>0) mp3data.push(new Int8Array(mp3buf)); }
let flush=mp3encoder.flush(); if(flush.length>0) mp3data.push(new Int8Array(flush));
let blob=new Blob(mp3data,{type:'audio/mp3'});
let base64=await new Promise(res=>{ let r=new FileReader(); r.onloadend=()=>res(r.result); r.readAsDataURL(blob); });
b.dataset.customSoundBase64=base64;
}catch(e){}
}
}
}catch(e){}
let clone=document.documentElement.cloneNode(true);
clone.querySelectorAll('#toolbar, #slide-panel, #main-mode-toggle, #text-prompt-modal, #import-file-input, #pdf-file-input, #global-image-input, #bg-image-input, #pair-image-input').forEach(el=>el.remove());
clone.querySelector('body').classList.add('view-mode');
let html='<!DOCTYPE html>\n'+clone.outerHTML;
let blob=new Blob([html],{type:'text/html'});
let a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='Memory_Game.html';
document.body.appendChild(a); a.click(); document.body.removeChild(a);
if(wasEdit) mainToggle?.click();
if(expBtn) { expBtn.innerText='  💾   Скачати Гру'; expBtn.disabled=false; }
});
// Імпорт
document.getElementById('import-btn')?.addEventListener('click',()=>document.getElementById('import-file-input').click());
document.getElementById('import-file-input')?.addEventListener('change',e=>{
if(!e.target.files[0]) return;
let r=new FileReader();
r.onload=ev=>{ let parser=new DOMParser(); let doc=parser.parseFromString(ev.target.result,'text/html'); let imported=doc.getElementById('presentation-area'); if(imported){ pArea.innerHTML=imported.innerHTML; deselectElement(); let slides=pArea.querySelectorAll('.slide'); slides.forEach(s=>s.classList.remove('active')); if(slides.length) slides[0].classList.add('active'); updateSlideCounter(); alert('Гру завантажено!');
} else alert('Невірний формат'); };
r.readAsText(e.target.files[0]); e.target.value='';
});
// Перемикання режиму
mainToggle?.addEventListener('click',()=>{
isEditMode=!isEditMode;
document.body.classList.toggle('edit-mode',isEditMode);
document.body.classList.toggle('view-mode',!isEditMode);
mainToggle.innerText=isEditMode?'  ▶     Грати  ':'  ✎     Редагувати  ';
let boards=pArea.querySelectorAll('.memory-board');
if(isEditMode){
boards.forEach(b=>{ buildMemoryGrid(b); });
} else {
deselectElement();
boards.forEach(b=>{ shuffleMemoryBoard(b); });
}
});
// Ігрова логіка кліків
pArea.addEventListener('click',e=>{
if(isEditMode) return;
let card=e.target.closest('.memory-card');
if(!card||card.classList.contains('is-flipped')||memoryLockBoard) return;
let board=card.closest('.memory-board');
let sound=board.dataset.sound||'swipe';
playSound(sound,board.dataset.customSoundBase64);
card.classList.add('is-flipped');
if(!memoryFirstCard){ memoryFirstCard=card; return; }
memorySecondCard=card;
memoryLockBoard=true;
if(memoryFirstCard.dataset.pairId===memorySecondCard.dataset.pairId){
setTimeout(()=>{
playSound('magic');
let r1=memoryFirstCard.getBoundingClientRect(), r2=memorySecondCard.getBoundingClientRect();
fireParticles(r1.left+r1.width/2,r1.top+r1.height/2);
fireParticles(r2.left+r2.width/2,r2.top+r2.height/2);
memoryFirstCard.classList.add('is-matched'); memorySecondCard.classList.add('is-matched');
let matched=parseInt(board.dataset.matchedPairs||'0')+1;
board.dataset.matchedPairs=matched;
let total=board.querySelectorAll('.memory-card').length/2;
if(matched>=total){
setTimeout(()=>{ playSound('win-game'); let br=board.getBoundingClientRect(); fireParticles(br.left+br.width/2,br.top+br.height/2); fireParticles(br.left+br.width/3,br.top+br.height/3); fireParticles(br.left+br.width/1.5,br.top+br.height/1.5); },500);
}
memoryFirstCard=null; memorySecondCard=null; memoryLockBoard=false;
},600);
} else {
setTimeout(()=>{
playSound('error');
memoryFirstCard.classList.remove('is-flipped'); memorySecondCard.classList.remove('is-flipped');
memoryFirstCard=null; memorySecondCard=null; memoryLockBoard=false;
},1200);
}
});
updateSlideCounter();

// --- ДОДАНИЙ КОД ДЛЯ АВТОМАТИЧНОГО ПЕРЕМІШУВАННЯ ПРИ ВІДКРИТТІ ЕКСПОРТОВАНОЇ ГРИ ---
window.addEventListener('DOMContentLoaded', () => {
    if (document.body.classList.contains('view-mode')) {
        document.querySelectorAll('.memory-board').forEach(b => {
            shuffleMemoryBoard(b);
        });
    }
});
</script>

</body></html>
